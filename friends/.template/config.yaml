# Bot configuration for {name}
# Telegram token is auto-resolved from env var TELEGRAM_BOT_TOKEN_{NAME_UPPER}

# Timezone (IANA format)
timezone: "America/New_York"

# Schedule: when this friend is "available" (24h format, local time)
schedule:
  wake_up: "07:00"
  sleep_at: "23:00"
  # Work hours — less responsive during these times
  work_start: "09:00"
  work_end: "17:00"
  # Days off (0=Monday, 6=Sunday)
  days_off: [5, 6]

# Work type: "office" (can check phone at desk) or "physical" (mostly can't)
work_type: "office"

# Chattiness: 0.0 (lurker) to 1.0 (never shuts up)
chattiness: 0.5

# How likely to respond to other bots (vs only Travis)
bot_reply_chance: 0.3
