# Sudomake Friends Configuration
anthropic_api_key: "${ANTHROPIC_API_KEY}"
model: "claude-4-sonnet-20250514"

# Telegram group chat ID (set after creating the group)
group_chat_id: "${TELEGRAM_GROUP_CHAT_ID}"  # -5159528618

# Chat history settings
chat:
  max_messages: 100          # messages kept in CHAT.md before compaction
  compact_to: 30             # after compaction, keep this many recent + summary

# How often bots check for new messages (seconds)
poll_interval: 2

# Friends are defined in friends/<name>/
# Each friend directory contains:
#   - SOUL.md    (personality, static)
#   - config.yaml (telegram token, timezone, schedule)
# Memory lives separately at data/memories/<name>/MEMORY.md
